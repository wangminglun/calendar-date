<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日期計算器 📅</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'PingFang TC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-size: 300% 300%;
      animation: bgShift 8s ease infinite;
      overflow: hidden;
    }

    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating bubbles */
    .bubbles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .bubble {
      position: absolute;
      bottom: -80px;
      border-radius: 50%;
      opacity: 0.18;
      animation: rise linear infinite;
      background: white;
    }
    @keyframes rise {
      to { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 28px;
      padding: 48px 44px 40px;
      width: min(460px, 92vw);
      box-shadow: 0 32px 64px rgba(0,0,0,0.25);
      animation: cardIn 0.7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: none; }
    }

    h1 {
      text-align: center;
      color: #fff;
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: .02em;
      margin-bottom: 8px;
      text-shadow: 0 2px 12px rgba(0,0,0,.25);
    }
    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.8);
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    .field { margin-bottom: 22px; }
    label {
      display: block;
      color: rgba(255,255,255,0.9);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    label span { margin-right: 6px; }

    input[type="date"],
    input[type="number"] {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 14px;
      background: rgba(255,255,255,0.18);
      color: #fff;
      font-size: 1.05rem;
      outline: none;
      transition: border-color .25s, background .25s, transform .15s;
      appearance: none;
    }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    input:hover  { background: rgba(255,255,255,0.25); }
    input:focus  { border-color: #fff; background: rgba(255,255,255,0.3); transform: scale(1.01); }
    input::placeholder { color: rgba(255,255,255,0.5); }

    .btn {
      width: 100%;
      padding: 16px;
      margin-top: 8px;
      border: none;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      background: linear-gradient(135deg, #ff6fd8, #3813c2);
      color: #fff;
      box-shadow: 0 6px 24px rgba(0,0,0,.3);
      transition: transform .15s, box-shadow .15s, filter .15s;
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(0,0,0,.35); filter: brightness(1.1); }
    .btn:active { transform: scale(0.97); }

    /* Result */
    .result {
      margin-top: 30px;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 18px;
      padding: 24px 22px;
      text-align: center;
      display: none;
      animation: popIn .45s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: none; }
    }
    .result.show { display: block; }
    .result-label {
      color: rgba(255,255,255,0.8);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .result-date {
      color: #fff;
      font-size: 2.1rem;
      font-weight: 900;
      letter-spacing: .02em;
      text-shadow: 0 2px 16px rgba(0,0,0,.3);
    }
    .result-weekday {
      margin-top: 6px;
      color: rgba(255,255,255,0.75);
      font-size: 1rem;
      font-weight: 500;
    }
    .result-diff {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .badge {
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 5px 16px;
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 99; }
    .confetti-piece {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 2px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="bubbles" id="bubbles"></div>
<div class="confetti-wrap" id="confetti"></div>

<div class="card">
  <h1>📅 日期計算器</h1>
  <p class="subtitle">輸入起始日期與天數，立刻得到訖日！</p>

  <div class="field">
    <label><span>🗓️</span>起始日期</label>
    <input type="date" id="startDate" />
  </div>

  <div class="field">
    <label><span>⏳</span>經過天數（天）</label>
    <input type="number" id="elapsedDays" placeholder="例如：30" min="0" />
  </div>

  <button class="btn" onclick="calculate()">✨ 計算訖日</button>

  <div class="result" id="result">
    <div class="result-label">📌 訖日（End Date）</div>
    <div class="result-date" id="resultDate">—</div>
    <div class="result-weekday" id="resultWeekday"></div>
    <div class="result-diff" id="resultBadges"></div>
  </div>
</div>

<script>
  // Floating bubbles
  const bubblesEl = document.getElementById('bubbles');
  const sizes = [40, 60, 80, 100, 50, 70, 90, 45, 65];
  sizes.forEach((s, i) => {
    const b = document.createElement('div');
    b.className = 'bubble';
    b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*8}s`;
    bubblesEl.appendChild(b);
  });

  const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

  function calculate() {
    const startVal = document.getElementById('startDate').value;
    const daysVal  = document.getElementById('elapsedDays').value;

    if (!startVal) { shake('startDate'); return; }
    if (daysVal === '' || isNaN(daysVal) || Number(daysVal) < 0) { shake('elapsedDays'); return; }

    const start   = new Date(startVal + 'T00:00:00');
    const days    = parseInt(daysVal, 10);
    const end     = new Date(start);
    end.setDate(end.getDate() + days);

    const y = end.getFullYear();
    const m = String(end.getMonth()+1).padStart(2,'0');
    const d = String(end.getDate()).padStart(2,'0');

    document.getElementById('resultDate').textContent = `${y} / ${m} / ${d}`;
    document.getElementById('resultWeekday').textContent = weekdays[end.getDay()];

    const weeks = Math.floor(days / 7);
    const rem   = days % 7;
    let badges = `<span class="badge">🗓️ 共 ${days} 天</span>`;
    if (weeks > 0) badges += `<span class="badge">📆 ${weeks} 週 ${rem > 0 ? rem + ' 天' : ''}</span>`;

    const months = monthDiff(start, end);
    if (months > 0) badges += `<span class="badge">🌙 約 ${months} 個月</span>`;

    document.getElementById('resultBadges').innerHTML = badges;

    const res = document.getElementById('result');
    res.classList.remove('show');
    void res.offsetWidth; // reflow
    res.classList.add('show');

    launchConfetti();
  }

  function monthDiff(a, b) {
    return (b.getFullYear() - a.getFullYear()) * 12 + (b.getMonth() - a.getMonth());
  }

  function shake(id) {
    const el = document.getElementById(id);
    el.style.animation = 'none';
    el.style.borderColor = '#ff6b6b';
    el.style.transform = 'translateX(-6px)';
    setTimeout(() => el.style.transform = 'translateX(6px)', 80);
    setTimeout(() => el.style.transform = 'translateX(-4px)', 160);
    setTimeout(() => el.style.transform = 'translateX(4px)', 240);
    setTimeout(() => { el.style.transform = ''; el.style.borderColor = ''; }, 320);
    el.focus();
  }

  function launchConfetti() {
    const wrap = document.getElementById('confetti');
    wrap.innerHTML = '';
    const colors = ['#ff6fd8','#fff','#ffd700','#00e5ff','#7fffb2','#ff9a3c'];
    for (let i = 0; i < 70; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      const size = 6 + Math.random() * 10;
      p.style.cssText = `
        left:${Math.random()*100}%;
        top:${-10 - Math.random()*30}px;
        width:${size}px; height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${1.2 + Math.random()*1.5}s;
        animation-delay:${Math.random()*0.6}s;
        border-radius:${Math.random()>0.5?'50%':'2px'};
      `;
      wrap.appendChild(p);
    }
    setTimeout(() => wrap.innerHTML = '', 2500);
  }

  // Allow pressing Enter to calculate
  document.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });

  // Auto-fill today
  const today = new Date();
  const iso = today.toISOString().slice(0,10);
  document.getElementById('startDate').value = iso;
</script>
</body>
</html>
